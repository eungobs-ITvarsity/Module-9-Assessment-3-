<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>Mini Blog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="stylesheet" href="css/custom.css" />
  <link href="fontawesome/css/all.css" rel="stylesheet" />
</head>
<body onload="init()">
  <div class="d-flex flex-column align-items-center p-3 bg-white border-bottom box-shadow fixed-top">
    <img src="img/mini-blog-logo.png" height="40" />
    <nav>
      <a id="getLatest" class="p-2 text-dark" href="#">Latest</a>
      <a id="getAll" class="p-2 text-dark active" href="#">All</a>
      <a id="getPopular" class="p-2 text-dark" href="#">Popular</a>
    </nav>
  </div>

  <div class="blog-header mix-auto text-center" style="margin-top: 80px;">
    <h1>Discover a Visual World</h1>
    <p class="lead">
      Sharing stunning images and stories from <strong><em>History</em></strong>,
      <strong><em>Food</em></strong>, <strong><em>Nature</em></strong>, and more — all around the globe.
    </p>
  </div>

  <div class="container team d-flex flex-wrap justify-content-center my-4">
    <img src="img/thandi.jpg" class="img-thumbnail rounded-circle m-2" width="90"/>
    <img src="img/john.jpg" class="img-thumbnail rounded-circle m-2" width="90"/>
    <img src="img/sally.jpg" class="img-thumbnail rounded-circle m-2" width="90"/>
    <img src="img/lungi.jpg" class="img-thumbnail rounded-circle m-2" width="90"/>
    <img src="img/bob.jpg" class="img-thumbnail rounded-circle m-2" width="90"/>
    <img src="img/dave.jpg" class="img-thumbnail rounded-circle m-2" width="90"/>
    <img src="img/jane.jpg" class="img-thumbnail rounded-circle m-2" width="90"/>
    <img src="img/andile.jpg" class="img-thumbnail rounded-circle m-2" width="90"/>
    <img src="img/lee.jpg" class="img-thumbnail rounded-circle m-2" width="90"/>
  </div>

  <div class="row container mx-auto mb-4">
    <div class="col" id="posts">Loading content.....</div>
  </div>

  <script src="js/jquery-3.7.1.min.js"></script>
  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
